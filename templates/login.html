<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0b1e3d;
      --accent: #2f80ed;
      --light: #f0f4fa;
      --white: #ffffff;
      --error: #e05252;
      --silver: #c8d6ea;
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      display: flex;
      min-height: 100vh;
      background: var(--navy);
    }

    .brand-panel {
      flex: 1.1;
      background: linear-gradient(145deg, #0b1e3d 0%, #0d2a56 60%, #0f3470 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 5rem;
      color: white;
    }

    .brand-panel h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .login-panel {
      flex: .9;
      background: var(--light);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
    }

    .login-box h2 {
      font-family: 'Syne', sans-serif;
      margin-bottom: 10px;
      color: #0b1e3d;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      font-size: .8rem;
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: .8rem;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .btn-login {
      width: 100%;
      padding: .9rem;
      background: #2f80ed;
      color: white;
      border: none;
      border-radius: 6px;
      font-family: 'Syne';
      cursor: pointer;
    }

    .btn-login:hover {
      background: #1a6fd8;
    }

  </style>
</head>
<body>

<div class="brand-panel">
  <h1>FreightPortal</h1>
  <p>Manage shipments, generate reports, and access logistics tools in one secure portal.</p>
</div>

<div class="login-panel">
  <div class="login-box">
    <h2>Sign in</h2>
    <form method="POST" action="/login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>

      <button class="btn-login">Sign In</button>
    </form>
  </div>
</div>

</body>
</html>
